name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: [latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun run test
        env:
          # Dummy values so env validation passes during tests
          DATABASE_URL: postgresql://user:pass@localhost:5432/test
          ACCESS_TOKEN_SECRET: test-access-secret-that-is-long-enough
          REFRESH_TOKEN_SECRET: test-refresh-secret-that-is-long-enough
          VERIFY_EMAIL_TOKEN_SECRET: test-verify-email-secret-long-enough
          FORGOT_PSWD_TOKEN_SECRET: test-forgot-pswd-secret-long-enough
          RESET_PSWD_TOKEN_SECRET: test-reset-pswd-secret-long-enough
          MFA_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          MFA_TEMP_TOKEN_SECRET: test-mfa-temp-secret-long-enough
          EMAIL_USER: test@example.com
          EMAIL_PASS: test-password
          APP_URL: http://localhost:5000
